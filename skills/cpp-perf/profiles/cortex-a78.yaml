# unverified — values from spec, pending PDF verification
name: Cortex-A78
arch: aarch64
vendor: ARM

pipeline:
  issue_width: 4
  dispatch_width: 2
  reorder_buffer: 160
  functional_units:
    alu: 3
    fp: 2
    load: 2
    store: 1
    branch: 1

registers:
  gpr: 31
  neon: 32

cache:
  l1d: { size_kb: 64, line_bytes: 64, associativity: 4, latency: 4 }
  l1i: { size_kb: 64, line_bytes: 64, associativity: 4 }
  l2:  { size_kb: 256, line_bytes: 64, associativity: 8, latency: 9 }
  l3:  { size_kb: 4096, line_bytes: 64, associativity: 16, latency: 30 }

instructions:
  integer:
    add: { lat: 1, tp: 0.25 }
    mul: { lat: 3, tp: 1 }
    div: { lat: 12, tp: 12 }
  fp:
    fadd: { lat: 2, tp: 0.5 }
    fmul: { lat: 3, tp: 0.5 }
    fdiv: { lat: 7, tp: 7 }
  neon:
    vld1: { lat: 4, tp: 0.5 }
    vst1: { lat: 1, tp: 0.5 }
    vmul_f32: { lat: 4, tp: 0.5 }
    fmla_f32: { lat: 4, tp: 0.5 }
  memory:
    load: { lat: 4, tp: 0.5 }
    store: { lat: 1, tp: 0.5 }
    prefetch: { lat: 0, tp: 0.25 }

branch:
  mispredict_penalty: 11
  predictor_type: TAGE

memory_system:
  load_queue_depth: 68
  store_queue_depth: 44
  tlb_miss_penalty: 30
  page_sizes_kb: [4, 64, 2048]

os_overhead:
  syscall: 500
  thread_create: 15000
  fork: 50000
  cpu_migration: 5000
  mutex_lock_unlock: 25
  spinlock: 12
  rwlock_read: 20
  rwlock_write: 25
  futex: 100
  atomic_seq_cst: 30
  atomic_acq_rel: 15
  atomic_relaxed: 1
  malloc_16b: 50
  malloc_256b: 55
  malloc_4kb: 80
  malloc_1mb: 2000
  mmap_anon: 3000
  minor_page_fault: 800
  major_page_fault: 50000
  huge_page_alloc: 1200
  file_open_close: 3000
  read_4kb: 1500
  write_4kb: 1800
  fsync: 50000
  pipe_roundtrip: 5000
  eventfd_roundtrip: 3000
  signal_delivery: 4000
  sched_yield: 2000
  timer_resolution_ns: 50
  context_switch: 3000
